name: CI + Docker Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull repo code into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Debug requirements file
      - name: Show requirements file
        run: cat requirements.txt

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      # 5. Flask import check
      - name: Run basic import test
        run: |
          python -m pip show flask
          python -c "import flask; print('Flask import OK')"

      # 6. Docker setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t devops-ml-app:latest .