name: CI + Docker Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: ls -la

      - name: Show requirements
        run: cat requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Test Flask import
        run: |
          python -c "import flask; print('Flask import OK')"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Generate version from commit SHA
      - name: Set image version
        run: echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build Docker image (versioned + latest tag)
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-ml-app:$VERSION .
          docker tag ${{ secrets.DOCKER_USERNAME }}/devops-ml-app:$VERSION ${{ secrets.DOCKER_USERNAME }}/devops-ml-app:latest

      # Push both tags
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-ml-app:$VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-ml-app:latest